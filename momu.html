<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Momu - 檔案館連動優化版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f8fafc;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            scroll-behavior: smooth;
        }
        .gradient-bar {
            transition: all 0.3s ease-in-out;
            cursor: pointer;
            position: relative;
        }
        .gradient-bar:hover {
            filter: brightness(1.2);
            transform: scaleY(1.1);
            z-index: 10;
        }
        .gradient-bar:hover::after {
            content: attr(data-date);
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: white;
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 4px;
            white-space: nowrap;
        }

        .tag-btn { transition: all 0.2s; }
        .tag-btn.active-mood {
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
            transform: scale(1.1);
            font-weight: bold;
            border: 2px solid currentColor;
        }

        /* 側邊導航與面板邏輯 */
        .side-nav-triggers {
            position: fixed;
            left: 0;
            top: 150px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 110; 
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .side-nav-triggers.pushed { transform: translateX(280px); }
        .nav-trigger-btn {
            width: 50px; height: 50px;
            display: flex; align-items: center; justify-content: center;
            color: white; border-radius: 0 12px 12px 0;
            box-shadow: 4px 0 10px rgba(0,0,0,0.1);
            transition: all 0.3s ease; cursor: pointer;
        }

        .info-panel {
            position: fixed; left: -300px; top: 100px;
            width: 280px; height: 550px;
            background: white; z-index: 100;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 0 24px 24px 0;
            box-shadow: 10px 0 30px rgba(0,0,0,0.1);
            overflow: hidden; display: flex; flex-direction: column;
        }
        .info-panel.active { left: 0; }

        .has-record::after {
            content: ''; position: absolute; bottom: 4px; left: 50%;
            transform: translateX(-50%); width: 4px; height: 4px;
            background-color: #6366f1; border-radius: 50%;
        }
        .selected-date {
            background-color: #e0e7ff; border-radius: 8px;
            color: #4338ca !important; font-weight: bold;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }

        .hover-save-trigger { position: relative; }
        .hover-save-btn {
            position: absolute;
            top: 10px; right: 10px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
            z-index: 20;
        }
        .hover-save-trigger:hover .hover-save-btn {
            opacity: 1;
            visibility: visible;
        }

        #debugTools {
            position: fixed; bottom: 20px; left: 20px;
            display: flex; flex-direction: column; gap: 8px;
            z-index: 999; background: rgba(255, 255, 255, 0.8);
            padding: 10px; border-radius: 15px; backdrop-filter: blur(4px);
            border: 1px solid #e2e8f0;
        }
        
        .stat-bar-container { background: rgba(255,255,255,0.05); height: 6px; border-radius: 3px; overflow: hidden; }
        .stat-bar-fill { height: 100%; transition: width 0.6s ease; }

        .ai-active-tab { background-color: #ec4899; color: white; border-color: #ec4899; }
        
        .nav-link { font-size: 13px; color: #64748b; transition: color 0.2s; cursor: pointer; }
        .nav-link:hover { color: #4f46e5; }

        /* 檔案館選中效果 */
        .db-item-active {
            border-color: #6366f1 !important;
            background-color: #1e1b4b !important;
            transform: translateX(4px);
        }

        /* 核心價值區塊樣式 */
        .core-section-title {
            font-size: 11px;
            font-weight: bold;
            color: #818cf8;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            letter-spacing: 0.05em;
        }
        .core-section-title::before {
            content: '';
            width: 3px;
            height: 12px;
            background: #818cf8;
            margin-right: 6px;
            border-radius: 2px;
        }

        /* 新增：核心價值區塊樣式 - 黃色 (語錄專用) */
        .core-section-title-amber {
            font-size: 11px;
            font-weight: bold;
            color: #fbbf24;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            letter-spacing: 0.05em;
        }
        .core-section-title-amber::before {
            content: '';
            width: 3px;
            height: 12px;
            background: #fbbf24;
            margin-right: 6px;
            border-radius: 2px;
        }
        
        /* A&I 面板標題樣式 - 粉色 */
        .ai-section-title {
            font-size: 11px;
            font-weight: bold;
            color: #f472b6;
            margin-bottom: 8px;
            margin-top: 12px;
            display: flex;
            align-items: center;
            letter-spacing: 0.05em;
        }
        .ai-section-title::before {
            content: '';
            width: 3px;
            height: 12px;
            background: #f472b6;
            margin-right: 6px;
            border-radius: 2px;
        }

        .stat-row {
            display: flex;
            align-items: center;
            margin-bottom: 6px;
            font-size: 10px;
            color: #cbd5e1;
        }
        .stat-label { width: 60px; }
        .stat-track {
            flex: 1;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
            margin: 0 8px;
        }
        .stat-value {
            height: 100%;
            background: #818cf8;
            border-radius: 2px;
        }
        .tag-chip {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
            margin: 0 4px 6px 0;
            border: 1px solid;
        }
        .tag-auto {
            background: rgba(99, 102, 241, 0.2);
            border-color: #6366f1;
            color: #a5b4fc;
        }
        .tag-manual {
            background: rgba(236, 72, 153, 0.1);
            border-color: #ec4899;
            color: #fbcfe8;
            position: relative;
            padding-right: 22px;
        }
        .tag-delete {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            opacity: 0.7;
        }
        .tag-delete:hover { opacity: 1; }
        
        /* 檔案館資料夾樣式 */
        .folder-header {
            cursor: pointer;
            user-select: none;
        }
        .folder-header:hover { background-color: rgba(255,255,255,0.05); }
        .folder-content { display: none; }
        .folder-content.open { display: block; }
        .folder-arrow { transition: transform 0.2s; }
        .folder-arrow.open { transform: rotate(90deg); }

        /* 生成內容區塊樣式 - 更新為可編輯 */
        .generated-content-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px dashed #6366f1;
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 11px;
            color: #e2e8f0;
            line-height: 1.6;
            white-space: pre-wrap;
            outline: none;
            transition: all 0.2s;
        }
        .generated-content-box:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #818cf8;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        /* 選項框樣式 */
        .selection-box {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 8px;
            margin-bottom: 8px;
            max-height: 120px;
            overflow-y: auto;
        }
        .checkbox-item {
            display: flex;
            align-items: start;
            gap: 6px;
            padding: 4px 0;
            font-size: 10px;
            color: #cbd5e1;
            cursor: pointer;
        }
        .checkbox-item:hover { color: white; }
        .checkbox-item input { margin-top: 2px; }

        /* 鎖定按鈕樣式 */
        .btn-locked {
            background: #475569 !important;
            cursor: not-allowed !important;
            opacity: 0.6;
            transform: none !important;
            box-shadow: none !important;
        }
        .btn-unlocked {
            /* 保留原本的 gradient 樣式 */
        }

        /* 社群資產選框樣式 */
        .social-asset-box {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(71, 85, 105, 0.5);
            border-radius: 12px;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
            cursor: pointer;
            margin-bottom: 8px;
        }
        .social-asset-box:hover {
            transform: scale(1.02);
            background: rgba(30, 41, 59, 0.8);
            border-color: #6366f1;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .social-count {
            background: #334155;
            color: #94a3b8;
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 999px;
            font-weight: bold;
        }

        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow { animation: spin-slow 8s linear infinite; }
    </style>
</head>
<body class="p-4 md:p-8" ondblclick="closeAllPanels()">

    <!-- Demo Tool -->
    <div id="debugTools" onclick="event.stopPropagation()">
        <div class="text-[10px] font-bold text-gray-400 mb-1 px-1 text-center">Demo Tool</div>
        <button onclick="debugSimulateOneDay()" class="text-[10px] bg-emerald-600 hover:bg-emerald-700 text-white px-3 py-2 rounded-lg font-bold shadow-lg active:scale-95">🌟 模擬今日數據</button>
        <button onclick="debugSimulateFullMonth()" class="text-[10px] bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-2 rounded-lg font-bold shadow-lg active:scale-95">🌙 隨機模擬一月</button>
    </div>

    <!-- 左側導航入口 -->
    <div id="sideNavTriggers" class="side-nav-triggers" onclick="event.stopPropagation()">
        <div onclick="togglePanel(event, 'databasePanel')" class="nav-trigger-btn bg-slate-800" title="心情檔案館">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 19a2 2 0 01-2-2V7a2 2 0 012-2h4l2 2h4a2 2 0 012 2v1M5 19h14a2 2 0 002-2v-5a2 2 0 00-2-2H9l-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>
        </div>
        <div onclick="togglePanel(event, 'aiCreationPanel')" class="nav-trigger-btn bg-pink-600" title="A&I 創作">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3" /></svg>
        </div>
    </div>

    <!-- Info Panels -->
    <!-- 日曆面板 (結構保留以避免報錯) -->
    <div id="calendarPanel" class="info-panel border-r" onclick="event.stopPropagation()">
        <div class="p-5 h-full flex flex-col">
            <div class="flex justify-between items-center mb-6">
                <h4 class="font-bold text-gray-700">📅 紀錄追蹤</h4>
                <button onclick="closeAllPanels()" class="text-gray-400">✕</button>
            </div>
            <div id="calendarGrid" class="grid grid-cols-7 gap-y-3 text-center text-xs flex-1"></div>
        </div>
    </div>

    <div id="databasePanel" class="info-panel bg-slate-900 text-white" onclick="event.stopPropagation()">
        <div class="p-5 h-full flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h4 class="font-bold text-indigo-300">📁 心情檔案館</h4>
                <button onclick="closeAllPanels()" class="text-gray-500">✕</button>
            </div>
            <div class="flex gap-1 mb-4">
                <button onclick="switchDatabase(0)" class="flex-1 py-1 text-[9px] bg-slate-800 rounded border border-slate-700 hover:bg-indigo-900 transition-colors">資產</button>
                <button onclick="switchDatabase(1)" class="flex-1 py-1 text-[9px] bg-slate-800 rounded border border-slate-700 hover:bg-indigo-900 transition-colors">核心</button>
                <button onclick="switchDatabase(2)" class="flex-1 py-1 text-[9px] bg-slate-800 rounded border border-slate-700 hover:bg-indigo-900 transition-colors">社群</button>
            </div>
            <div class="flex-1 overflow-y-auto custom-scrollbar pr-1">
                <div id="dbTypeLabel" class="text-[10px] text-indigo-400 font-bold mb-3 uppercase tracking-widest">載入中...</div>
                <div id="dbList" class="space-y-3 pb-4"></div>
            </div>
        </div>
    </div>

    <div id="aiCreationPanel" class="info-panel bg-slate-900 text-white" onclick="event.stopPropagation()">
        <div class="p-5 h-full flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h4 class="font-bold text-pink-400 flex items-center"><span class="mr-2">✨</span>A&I 創作</h4>
                <button onclick="closeAllPanels()" class="text-gray-500">✕</button>
            </div>
            <div class="flex gap-1 mb-4">
                <button onclick="switchAITab(0)" id="aiTab0" class="flex-1 py-1.5 text-[9px] bg-slate-800 rounded border border-slate-700 transition-all ai-active-tab">心境共振</button>
                <button onclick="switchAITab(1)" id="aiTab1" class="flex-1 py-1.5 text-[9px] bg-slate-800 rounded border border-slate-700 transition-all">創作清單</button>
                <button onclick="switchAITab(2)" id="aiTab2" class="flex-1 py-1.5 text-[9px] bg-slate-800 rounded border border-slate-700 transition-all">社群文案</button>
            </div>
            <div id="aiContentArea" class="flex-1 overflow-y-auto custom-scrollbar pr-1 relative"></div>
            
            <!-- 上傳貼文觸發鍵 (純展示) -->
            <div id="uploadTriggerContainer" class="hidden absolute bottom-4 left-4 right-4 z-50">
                <button onclick="alert('【商業模式展示】\n連結至社群平台的 API 接口已觸發！\n用戶可在此一鍵發佈選擇的創作內容。')" class="w-full bg-gradient-to-r from-sky-500 to-blue-600 hover:from-sky-400 hover:to-blue-500 text-white text-xs py-3 rounded-xl font-bold shadow-xl border border-white/20 flex items-center justify-center gap-2 transition-all active:scale-95">
                    <span>☁️</span> 上傳至社群 (預覽)
                </button>
            </div>
        </div>
    </div>

    <!-- Header Navigation -->
    <nav class="max-w-4xl mx-auto mb-8 flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm">
        <div class="flex items-center gap-6">
            <h1 class="text-xl font-bold text-indigo-600">Momu</h1>
            <div id="historyModeBadge" class="hidden flex items-center bg-amber-100 text-amber-700 px-3 py-1 rounded-full text-[10px] font-bold border border-amber-200">
                <span class="mr-2" id="historyLabel">🔍 歷史回顧模式</span>
                <button onclick="resetToToday()" class="underline">回到今日</button>
            </div>
        </div>
        <div class="flex items-center gap-6">
            <a href="https://gamma.app/docs/Momu-94kqbubvuv9o4ed" target="_blank" class="nav-link">提案簡報</a>
            <a href="https://drive.google.com/file/d/16dYzVxZ_gzdwKDNZbVcRxm8m8LAsBaHb/view?usp=sharing" target="_blank" class="nav-link">展示影片</a>
            <div class="w-8 h-8 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-600 font-bold text-xs">User</div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="bg-white p-6 rounded-3xl shadow-lg border border-gray-100 relative">
                <div id="archivePreviewBadge" class="hidden absolute top-4 right-6 bg-indigo-100 text-indigo-600 text-[9px] px-2 py-0.5 rounded-full font-bold animate-pulse">檔案館預覽中</div>
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-gray-500 text-sm font-bold">心情總體光譜</h3>
                    <span id="clickHint" class="text-[10px] text-indigo-400 opacity-60">點擊色塊可跳轉日記</span>
                </div>
                <div class="h-16 w-full bg-gray-100 rounded-full overflow-hidden flex shadow-inner" id="moodSpectrum">
                    <div class="flex items-center justify-center w-full text-gray-400 text-xs italic">累積 7 天紀錄後生成</div>
                </div>
                <div class="mt-4 flex justify-between text-[10px] text-gray-400 font-mono">
                    <span id="spectrumStart">START</span>
                    <span id="spectrumEnd">END</span>
                </div>
            </div>

            <div class="flex flex-col gap-4">
                <div id="aiReportCard" class="hover-save-trigger bg-white p-5 rounded-3xl shadow-lg border border-indigo-5 flex-[1.5] min-h-[180px] flex flex-col relative overflow-hidden">
                    <button id="saveToAssetBtn" onclick="saveSummaryToDatabase(0)" class="hover-save-btn bg-indigo-600 text-white text-[10px] px-3 py-1.5 rounded-full font-bold shadow-md hover:bg-indigo-700">儲存週報告</button>
                    <div class="flex items-center mb-3 justify-between">
                        <div class="flex items-center">
                            <span class="bg-indigo-500 text-white text-[10px] px-2 py-1 rounded-md mr-2">AI 深度分析</span>
                            <h3 class="text-indigo-900 font-bold text-sm">週總評</h3>
                        </div>
                    </div>
                    <div id="aiComment" class="text-gray-600 text-xs leading-relaxed mb-2 overflow-y-auto custom-scrollbar flex-1">請點擊下方「當週心情總評」按鈕開始分析。</div>
                    <div id="keywordTags" class="mt-auto flex flex-wrap gap-2 py-1"></div>
                </div>

                <div class="hover-save-trigger bg-white p-5 rounded-3xl shadow-lg border border-amber-50 flex-1 relative overflow-hidden">
                    <button onclick="saveQuoteToDatabase(1)" class="hover-save-btn bg-amber-500 text-white text-[10px] px-3 py-1.5 rounded-full font-bold shadow-md hover:bg-amber-600">儲存語錄</button>
                    <div class="flex items-center mb-2">
                        <span class="bg-amber-400 text-white text-[10px] px-2 py-1 rounded-md mr-2">每日語錄</span>
                        <h3 class="text-amber-900 font-bold text-sm">聽聽靈感</h3>
                    </div>
                    <p id="quoteText" class="text-gray-700 text-xs font-medium italic mb-1">「載入中...」</p>
                    <p id="quoteAuthor" class="text-right text-[10px] text-gray-400">— 佚名</p>
                </div>
            </div>
        </div>

        <div id="entrySection" class="bg-white p-8 rounded-3xl shadow-xl border-2 border-transparent">
            <!-- 推薦歌曲結果面板 -->
            <div id="musicRecommendPanel" class="relative hidden mb-8 bg-slate-900 text-white p-6 rounded-2xl border-l-4 border-indigo-500">
                <div class="flex justify-between items-start mb-3">
                    <div class="flex items-center gap-2">
                        <div class="w-8 h-8 bg-indigo-500 rounded-full flex items-center justify-center animate-spin-slow">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3" /></svg>
                        </div>
                        <h4 class="text-indigo-400 font-bold text-sm">今日心境推薦音樂</h4>
                    </div>
                    <button onclick="document.getElementById('musicRecommendPanel').classList.add('hidden')" class="text-slate-500 hover:text-white">✕</button>
                </div>
                <div id="musicContent" class="space-y-2">
                    <div class="text-lg font-bold text-white tracking-wide" id="songName">---</div>
                    <div class="text-xs text-slate-400 mb-2" id="artistName">---</div>
                    <div class="text-[11px] bg-slate-800 p-3 rounded-lg border border-slate-700 leading-relaxed text-slate-300 italic" id="recommendReason">---</div>
                </div>
                
                <!-- Action Group: Save & Feedback -->
                <div class="absolute top-4 right-10 flex flex-col items-end gap-2">
                    <button onclick="saveMusicToAsset()" class="bg-indigo-600 hover:bg-indigo-700 text-white text-[10px] px-3 py-1.5 rounded-full font-bold shadow-md transition-all active:scale-95 flex items-center gap-1">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-11a1 1 0 10-2 0v2H7a1 1 0 100 2h2v2a1 1 0 102 0v-2h2a1 1 0 100-2h-2V7z" clip-rule="evenodd" />
                        </svg>
                        儲存至心境共振
                    </button>

        function extractRealKeywords(text) {
            if (!text) return [];
            
            const counts = {};
            keywordLibrary.forEach(word => {
                const regex = new RegExp(word, 'g');
                const matches = text.match(regex);
                if (matches) {
                    counts[word] = matches.length;
                }
            });

            let sortedWords = Object.entries(counts).sort((a, b) => b[1] - a[1]);
            
            if (sortedWords.length > 0) {
                return sortedWords.slice(0, 4).map(w => w[0]);
            }

            let hash = 0;
            for (let i = 0; i < text.length; i++) {
                hash = text.charCodeAt(i) + ((hash << 5) - hash);
            }
            const count = Math.min(4, keywordLibrary.length);
            const result = [];
            for (let i = 0; i < count; i++) {
                const index = Math.abs(hash + i * 13) % keywordLibrary.length;
                result.push(keywordLibrary[index]);
            }
            return result;
        }

                    <div class="core-section-title">AI 核心關鍵字 (Top 4)</div>
                    <div class="mb-4 flex flex-wrap">
                        ${extractedKeywords.length > 0 ? extractedKeywords.map(kw => `

                    </div>

                    </div>
                    
                    ${manualTags.length < 4 ? `
                        <div class="flex gap-2 mb-3">
                            <input type="text" id="manualTagInput" placeholder="輸入省思/目標..."

            let listHTML = `
                <div class="core-section-title-amber mt-6">語錄收藏</div>

            `;
            
            if (data.length === 0) {

                            </div>
                            <div class="folder-content pl-1 mt-1 space-y-2">

                                        <div class="text-[9px] text-slate-400 mb-1">${item.date}</div>
                                        <div class="text-[11px] text-slate-200 italic leading-relaxed">${item.text}</div>
                                        ${item.type === 'custom_quote' ? '<div class="text-[9px] text-amber-500/70 mt-1 text-right">✨ 自訂</div>' : ''}
                                    </div>
                                `).join('')}

                    `;

            }
            listHTML += '</div>';

            let bottomHTML = `
                <div class="mt-2 pt-4 border-t border-slate-700 sticky bottom-0 bg-slate-900 shadow-xl">
                    <div class="text-[10px] font-bold text-amber-400 mb-2 text-right">記錄我的靈感金句</div>
                    <div class="flex gap-2">
                        <textarea id="customQuoteInput" rows="2" placeholder="寫下對你充滿意義的一句話..." 
                            class="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-xs text-white outline-none focus:border-amber-500 resize-none"></textarea>
                    </div>
                    <button onclick="saveCustomQuote()" class="w-full mt-2 bg-amber-600 hover:bg-amber-700 text-white text-xs py-2 rounded-lg font-bold transition-colors shadow-md active:scale-95">

        function saveCustomQuote() {
            const input = document.getElementById('customQuoteInput');
            const text = input.value.trim();
            if (!text) return;

            const today = new Date().toISOString().split('T')[0];
            const newItem = {
                date: today,
                text: `「${text}」`,
                type: 'custom_quote'
            };

            if (!databases.storage[1]) databases.storage[1] = [];
            databases.storage[1].unshift(newItem); 
            localStorage.setItem('soul_spectrum_db', JSON.stringify(databases));
            
            input.value = '';
            renderInspirationPanel();
            showToast("已儲存您的靈感金句");
        }

        function addManualTag() {
            const input = document.getElementById('manualTagInput');
            const val = input.value.trim();
            if (!val) return;

            if (!Array.isArray(databases.storage[2])) databases.storage[2] = [];
            
            if (databases.storage[2].length >= 4) {
                showToast("最多只能新增 4 個自定義標籤");
                return;
            }

            databases.storage[2].push({ type: 'core_tag', text: val });
            localStorage.setItem('soul_spectrum_db', JSON.stringify(databases));
            input.value = '';
            renderInspirationPanel(); 
        }

        function deleteManualTag(idx) {
            if (!databases.storage[2]) return;
            databases.storage[2].splice(idx, 1);
            localStorage.setItem('soul_spectrum_db', JSON.stringify(databases));
            renderInspirationPanel(); 
        }

        function selectMood(mood, color, btn) {
            currentMood = mood; currentColor = color;
            document.querySelectorAll('#moodGroup button').forEach(b => b.classList.remove('active-mood'));
            btn.classList.add('active-mood');

        function selectEvent(ev, btn) {
            currentEvent = ev;
            document.querySelectorAll('#eventGroup button').forEach(b => b.classList.remove('bg-indigo-600', 'text-white'));
            btn.classList.add('bg-indigo-600', 'text-white');
        }

        function saveCurrentEntry() {
            const text = document.getElementById('diaryInput').value;
            const date = document.getElementById('recordDate').value;
            if (!currentMood || !text) { showToast("請選擇心情並填寫內容"); return; }
            diaryEntries[date] = { mood: currentMood, color: currentColor, text, date, event: currentEvent };
            localStorage.setItem('soul_spectrum_entries', JSON.stringify(diaryEntries));
            
            // Sync to Mood Assets Storage (databases.storage[0]) for list visibility
            if (!databases.storage[0]) databases.storage[0] = [];
            const newAssetItem = {
                date: date,
                text: text.substring(0, 30) + (text.length > 30 ? "..." : ""),
                type: 'diary_log'
            };
            // Check if entry already exists to update instead of dup
            const existingIndex = databases.storage[0].findIndex(item => item.date === date && item.type === 'diary_log');
            if (existingIndex > -1) {
                databases.storage[0][existingIndex] = newAssetItem;
            } else {
                databases.storage[0].unshift(newAssetItem);
            }
            // Sort by date descending
            databases.storage[0].sort((a,b) => new Date(b.date) - new Date(a.date));
            localStorage.setItem('soul_spectrum_db', JSON.stringify(databases));

            refreshQuote(); 
            showToast("紀錄已存入心情資產");
            generateSpectrum();
            renderCalendar();
            updateEntryCount();
            
            // Re-calculate analysis for current week to ensure data integrity
            analyzeWeeklyMood();
            
            // Force UI update if panel is open
            if(databases.currentIdx === 0) renderAssetsFolderStructure();
        }

            if (!currentMood) { showToast("請先選擇今日心情"); return; }

        // Updated: Analyze Weekly Mood based on TARGET DATE with Deterministic Keywords
        function analyzeWeeklyMood(targetDate = null) {
            let entriesToAnalyze = [];
            
            // Calculate start/end of week for the target date
            let refDate = targetDate ? new Date(targetDate) : new Date();
            const day = refDate.getDay();
            const diff = refDate.getDate() - day; 
            const startOfWeek = new Date(refDate.setDate(diff));
            startOfWeek.setHours(0,0,0,0);
            const endOfWeek = new Date(startOfWeek);
            endOfWeek.setDate(startOfWeek.getDate() + 6);
            endOfWeek.setHours(23,59,59,999);

            // Create a unique seed for this specific week (e.g. "2026-W05")
            const weekSeed = `${startOfWeek.getFullYear()}-W${Math.ceil((((startOfWeek - new Date(startOfWeek.getFullYear(),0,1)) / 86400000) + 1)/7)}`;

            // Filter entries
            const entries = Object.values(diaryEntries);
            entriesToAnalyze = entries.filter(e => {
                const d = new Date(e.date);
                return d >= startOfWeek && d <= endOfWeek;
            });
            
            // Strict check: Less than 7 days -> No Analysis
            if (entriesToAnalyze.length < 7) {
                 if(targetDate || true) { // Always show this status
                     document.getElementById('aiComment').innerText = "需累積滿 7 天日記，方可生成週總評。";
                     document.getElementById('keywordTags').innerHTML = "";
                     currentKeywords = []; // Clear keywords for creation tool
                     return;
                 }
            }

            // Analysis Logic
            let negCount = 0;
            let allText = "";
            const negativeMoods = ['怒', '哀', '無人理解'];
            
            // Sort entries by date to ensure deterministic text concatenation
            entriesToAnalyze.sort((a,b) => new Date(a.date) - new Date(b.date));

            entriesToAnalyze.forEach(entry => {
                if (negativeMoods.includes(entry.mood)) negCount++;
                allText += entry.text + " ";
            });

            let response = "";
            const isNegativeWeek = negCount > (entriesToAnalyze.length / 2); 

            const wittyJokes = [
                "這週有點水逆？沒事，這週的運氣都拿去抵銷水逆了，下週準備起飛！🚀",
                "這週的混亂程度簡直可以寫成八點檔了，但你是主角，主角都有主角光環的，撐住！",
                "生活給你檸檬，你就把它榨汁...然後加點龍舌蘭做成調酒！乾杯！🍸",
                "這週有點 emo？沒關係，emo 是為了讓下次快樂更顯眼。就像薯條加鹽更好吃一樣。",
                "如果不順利，就當作是命運在幫你累積「反擊」的能量條！",
                "這週的狀態就像Wifi訊號不穩，連線中斷沒關係，重開機就好了！"
            ];

            const wittyAffirmations = [
                "這週狀態開掛了吧？是被外星人附身還是中了樂透？繼續保持這種可怕的順利！",
                "看你的紀錄，這週簡直是人生贏家組別的。記得分點好運給我這個 AI 啊！",
                "這週過得太順了，我都懷疑你是不是偷看了劇本？做得好！",
                "這能量場太強了，隔著螢幕我都感覺到你的光芒，請受小弟一拜！🙇",
                "這種穩定輸出的節奏，簡直是教科書級別的完美一週！"
            ];
            
            // Use weekSeed for deterministic random selection
            let seedVal = 0;
            for(let i=0; i<weekSeed.length; i++) seedVal += weekSeed.charCodeAt(i);
            
            if (entriesToAnalyze.length > 0) {
                if (isNegativeWeek) {
                    response = wittyJokes[seedVal % wittyJokes.length];
                } else {
                    response = wittyAffirmations[seedVal % wittyAffirmations.length];
                }
            } else {
                 response = "累積更多日記，讓我更了解你吧！";
            }

            const keywords = extractRealKeywords(allText);
            
            // Update global currentKeywords (This is what creation tools read)
            currentKeywords = keywords; 

            document.getElementById('aiComment').innerText = response;
            document.getElementById('keywordTags').innerHTML = keywords.map(k => 
                `<span class="bg-indigo-50 text-indigo-500 text-[10px] px-2 py-1 rounded">#${k}</span>`
            ).join('');
            
            if(!targetDate) showToast("AI 週總評生成完畢");
        }

        function generateKeywords() {
            analyzeWeeklyMood();
        }

        // New function to handle music feedback toggle (visual only)
        function toggleMusicFeedback(btn, type) {
             const parent = btn.parentElement;
             const buttons = parent.querySelectorAll('button');
             
             // Check if already active to toggle off
             const isActive = type === 'like' ? btn.classList.contains('text-pink-400') : btn.classList.contains('text-indigo-400');
             
             // Reset all
             buttons.forEach(b => {
                 b.classList.remove('text-pink-400', 'text-indigo-400', 'font-bold', 'bg-white/10');
                 b.classList.add('text-slate-400');
             });
             
             if (!isActive) {
                 btn.classList.remove('text-slate-400');
                 btn.classList.add(type === 'like' ? 'text-pink-400' : 'text-indigo-400', 'font-bold', 'bg-white/10');
                 showToast(type === 'like' ? "已按讚：將推薦更多類似風格" : "已回饋：將減少推薦此類風格");
             }
        }
